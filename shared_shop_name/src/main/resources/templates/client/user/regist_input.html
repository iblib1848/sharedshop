<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{user}+#{title.input.new}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user user_regist_input">
	<h2 th:class="title" th:text="#{user}+#{title.input.new}"></h2>
	<p th:class="input_message" th:text="#{msg.regist.input}"></p>

	<div class="user_info_form_area">
		<form th:action="@{/client/user/regist/check}" method="post" class="user_info_form" th:object="${userForm}">
			<ul class="input_list">
				<label><span class="input_title">[[#{userForm.email}]]</span></label>
				<div class="error_message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
				<input type="text" th:field="*{email}" />
				</li>
				<li>
					<label><span class="input_title">[[#{userForm.password}]]</span></label>
					<div class="error_message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
					</div>
					<input type="password" th:field="*{password}" />
				</li>
				<li>
					<label><span class="input_title">[[#{userForm.name}]]</span></label>
					<div class="error_message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
					</div>
					<input type="text" th:field="*{name}" />
				</li>
				<li>
					<label><span class="input_title">[[#{userForm.postalCode}]]</span></label>
					<div class="error_message" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}">
					</div>
					<input type="text" th:field="*{postalCode}" />
				</li>
				<li>
					<label><span class="input_title">[[#{userForm.address}]]</span></label>
					<div class="error_message" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">
					</div>
					<textarea rows="6" th:field="*{address}"></textarea>
				</li>
				<li>
					<label><span class="input_title">[[#{userForm.phoneNumber}]]</span></label>
					<div class="error_message" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}">
					</div>
					<input type="text" th:field="*{phoneNumber}" />
				</li>
			</ul>
			<input type="hidden" name="authority" value="2" />
			<input type="submit" value="確認" th:class="send_button" />
		</form>
		<form th:action="@{/}" method="post">
			<input type="submit" value="戻る" class="back_button" />
		</form>
	</div>
</body>

</html>
